{% extends "base.html" %}
{% block title %}Abmeldung{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-md w-full max-w-sm p-8 text-center">
        <h1 class="text-xl font-bold text-gray-900 mb-4">Wirklich abmelden?</h1>
        <form method="post">
            {% csrf_token %}
            <button type="submit"
                    class="bg-blue-600 text-white py-2 px-6 rounded-lg hover:bg-blue-700 font-medium text-sm">
                Ja, abmelden
            </button>
            <a href="/" class="ml-3 text-gray-500 text-sm hover:underline">Abbrechen</a>
        </form>
    </div>
</div>
{% endblock %}
