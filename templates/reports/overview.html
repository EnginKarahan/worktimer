{% extends "base.html" %}
{% block title %}Berichte{% endblock %}
{% block content %}
<h1 class="text-xl font-semibold text-gray-900 mb-6">Berichte</h1>
<div class="bg-white rounded-lg shadow p-6 max-w-lg">
    <h2 class="text-base font-medium text-gray-900 mb-4">Monatsbericht herunterladen</h2>
    <div x-data="{ year: {{ current_year }}, month: {{ current_month }} }" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Jahr</label>
                <input type="number" x-model="year" min="2020" max="2030" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Monat</label>
                <input type="number" x-model="month" min="1" max="12" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
            </div>
        </div>
        <div class="flex space-x-3">
            <a :href="`{% url 'reports:pdf' %}?year=${year}&month=${month}`"
               class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm font-medium">
                PDF herunterladen
            </a>
            <a :href="`{% url 'reports:excel' %}?year=${year}&month=${month}`"
               class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 text-sm font-medium">
                Excel herunterladen
            </a>
        </div>
    </div>
</div>
{% endblock %}
