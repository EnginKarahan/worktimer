<div id="timer-widget">
{% if active_entry %}
<div x-data="{ seconds: {{ active_entry.gross_minutes|default:0 }} * 60 }"
     {% if active_entry.status == 'RUNNING' %}
     x-init="setInterval(() => seconds++, 1000)"
     {% endif %}>
    <div class="text-center">
        <div class="text-5xl font-mono font-bold text-blue-700 mb-4"
             x-text="Math.floor(seconds/3600).toString().padStart(2,'0') + ':' + Math.floor((seconds%3600)/60).toString().padStart(2,'0') + ':' + (seconds%60).toString().padStart(2,'0')">
        </div>
        <div class="text-sm text-gray-500 mb-4">
            Seit {{ active_entry.start_time|time:"H:i" }} Uhr –
            <span class="font-medium {% if active_entry.status == 'RUNNING' %}text-green-600{% else %}text-yellow-600{% endif %}">
                {{ active_entry.get_status_display }}
            </span>
        </div>
        <div class="flex justify-center space-x-3">
            {% if active_entry.status == 'RUNNING' %}
            <form method="post" action="{% url 'timesessions:pause' %}">
                {% csrf_token %}
                <button type="submit" class="px-4 py-2 bg-yellow-500 text-white rounded-lg hover:bg-yellow-600 text-sm font-medium">
                    Pause
                </button>
            </form>
            {% else %}
            <form method="post" action="{% url 'timesessions:resume' %}">
                {% csrf_token %}
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">
                    Weiter
                </button>
            </form>
            {% endif %}
            <form method="post" action="{% url 'timesessions:clock_out' %}">
                {% csrf_token %}
                <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 text-sm font-medium">
                    Ausstempeln
                </button>
            </form>
        </div>
    </div>
</div>
{% else %}
<div class="text-center">
    <div class="text-5xl font-mono font-bold text-gray-300 mb-4">00:00:00</div>
    <p class="text-gray-500 text-sm mb-4">Kein aktiver Timer</p>
    <form method="post" action="{% url 'timesessions:clock_in' %}">
        {% csrf_token %}
        <button type="submit" class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium">
            Einstempeln
        </button>
    </form>
</div>
{% endif %}
</div>
